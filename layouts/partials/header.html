{{/* layouts/partials/header.html */}}
<header class="site-header sticky top-0 z-30 bg-white dark:bg-gray-900 shadow-none">
    <div class="max-w-content mx-auto px-4 md:px-6 border-b border-subtle dark:border-gray-700">
        <nav class="flex justify-between items-center py-3" aria-label="Main navigation">
            <a href="{{ .Site.BaseURL }}" class="text-lg font-semibold text-primary dark:text-gray-100 hover:text-primary transition-opacity">
                {{ .Site.Title | default "Home" }}
            </a>

            <div class="flex items-center space-x-4">
                 {{ with site.GetPage "/about" }}
                 <a href="{{ .RelPermalink }}" class="text-sm text-secondary dark:text-gray-400 hover:text-strong dark:hover:text-gray-100 transition-colors">About</a>
                 {{ end }}
                 {{ with site.GetPage "/feeds" }}
                 <a href="{{ .RelPermalink }}" class="text-sm text-secondary dark:text-gray-400 hover:text-strong dark:hover:text-gray-100 transition-colors" title="RSS Feeds">RSS</a>
                 {{ end }}
                 {{ with .Site.Params.linkedinUrl }}
                 <a href="{{ . }}" class="text-sm text-secondary dark:text-gray-400 hover:text-strong dark:hover:text-gray-100 transition-colors" title="LinkedIn Profile" target="_blank" rel="noopener noreferrer">Linkedin</a>
                 {{ end }}

                 {{/* Dark mode toggle */}}
                 <button id="dark-mode-toggle" aria-label="Toggle dark mode" class="text-secondary dark:text-gray-400 hover:text-strong dark:hover:text-gray-100 transition-colors p-1 rounded">
                     {{/* Sun icon — shown in dark mode */}}
                     <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="hidden dark:block w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                         <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.66-9H21M3 12H2m15.36-6.36-.71.71M6.34 17.66l-.71.71M17.66 17.66l.71.71M6.34 6.34l.71.71M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7z" />
                     </svg>
                     {{/* Moon icon — shown in light mode */}}
                     <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="block dark:hidden w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                         <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                     </svg>
                 </button>
            </div>
        </nav>
    </div>
</header>
