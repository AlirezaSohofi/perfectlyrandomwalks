{{/* layouts/partials/header.html */}}
<header class="site-header sticky top-0 z-10 bg-white dark:bg-gray-800 shadow-md">
    <nav class="container mx-auto px-4 py-2 flex justify-between items-center">
        <a href="{{ .Site.BaseURL | relURL }}" class="font-bold text-lg text-gray-800 dark:text-gray-100 hover:text-blue-600 dark:hover:text-blue-400">Home</a>
        {{/* We'll add the button JS later */}}
        <button id="darkModeToggle" aria-label="Toggle Dark Mode" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
            <svg id="moon-icon" class="h-5 w-5 hidden dark:inline" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            <svg id="sun-icon" class="h-5 w-5 inline dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707.707M6.343 6.343l-.707.707m12.728 0l-.707-.707M6.343 17.657l-.707-.707M12 12a5 5 0 100-10 5 5 0 000 10z"></path></svg>
        </button>
    </nav>
</header>
