name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main  # Or your default branch

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true  # Fetch Hugo themes (if using submodules)

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          # extended: true # Uncomment if you need the extended version of Hugo

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          external_repository: AlirezaSohofi/AlirezaSohofi.github.io
          publish_dir: ./public
          # cname: your.custom.domain # Add your custom domain here